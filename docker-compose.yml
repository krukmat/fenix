# Post-MVP Polish — Docker Compose: Go backend + BFF
# Ollama runs on the HOST machine (localhost:11434) — no Docker Ollama container needed.
# Usage: docker compose up --build backend bff
version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-32-chars-minimum!!}
      - DATABASE_URL=/data/fenixcrm.db
      # Task 4.4 UAT fix: use host Ollama (already has all models) instead of Docker Ollama container
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-llama3.2:3b-instruct-q4_K_M}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-nomic-embed-text}
    volumes:
      - db_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  bff:
    build:
      context: .
      dockerfile: deploy/Dockerfile.bff
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8080
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/bff/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  db_data:
