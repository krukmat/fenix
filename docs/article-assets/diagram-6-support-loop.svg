<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="420" fill="#ffffff"/>

  <!-- Column headers -->
  <rect x="30" y="20" width="380" height="36" rx="4" fill="#f0f0f0"/>
  <text x="220" y="43" text-anchor="middle" font-size="14" font-weight="600" fill="#555555">Classic CRM</text>

  <rect x="490" y="20" width="380" height="36" rx="4" fill="#1a1a1a"/>
  <text x="680" y="43" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Agentic CRM</text>

  <!-- Divider -->
  <line x1="450" y1="20" x2="450" y2="400" stroke="#eeeeee" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== LEFT COLUMN: Classic CRM ===== -->

  <!-- Step 1 -->
  <rect x="60" y="80" width="320" height="40" rx="4" fill="#ffffff" stroke="#dddddd" stroke-width="1.5"/>
  <text x="220" y="100" text-anchor="middle" font-size="12" fill="#333333">1. Person reads the message</text>
  <text x="220" y="113" text-anchor="middle" font-size="10" fill="#aaaaaa">manual</text>
  <line x1="220" y1="120" x2="220" y2="135" stroke="#dddddd" stroke-width="1.5"/>
  <polygon points="215,135 220,143 225,135" fill="#dddddd"/>

  <!-- Step 2 -->
  <rect x="60" y="145" width="320" height="40" rx="4" fill="#ffffff" stroke="#dddddd" stroke-width="1.5"/>
  <text x="220" y="165" text-anchor="middle" font-size="12" fill="#333333">2. Someone classifies the issue</text>
  <text x="220" y="178" text-anchor="middle" font-size="10" fill="#aaaaaa">manual</text>
  <line x1="220" y1="185" x2="220" y2="200" stroke="#dddddd" stroke-width="1.5"/>
  <polygon points="215,200 220,208 225,200" fill="#dddddd"/>

  <!-- Step 3 -->
  <rect x="60" y="210" width="320" height="40" rx="4" fill="#ffffff" stroke="#dddddd" stroke-width="1.5"/>
  <text x="220" y="230" text-anchor="middle" font-size="12" fill="#333333">3. Someone updates the case</text>
  <text x="220" y="243" text-anchor="middle" font-size="10" fill="#aaaaaa">manual</text>
  <line x1="220" y1="250" x2="220" y2="265" stroke="#dddddd" stroke-width="1.5"/>
  <polygon points="215,265 220,273 225,265" fill="#dddddd"/>

  <!-- Step 4 -->
  <rect x="60" y="275" width="320" height="40" rx="4" fill="#ffffff" stroke="#dddddd" stroke-width="1.5"/>
  <text x="220" y="295" text-anchor="middle" font-size="12" fill="#333333">4. Someone decides to escalate</text>
  <text x="220" y="308" text-anchor="middle" font-size="10" fill="#aaaaaa">manual</text>
  <line x1="220" y1="315" x2="220" y2="330" stroke="#dddddd" stroke-width="1.5"/>
  <polygon points="215,330 220,338 225,330" fill="#dddddd"/>

  <!-- Step 5 (stale result) -->
  <rect x="60" y="340" width="320" height="40" rx="4" fill="#f5f5f5" stroke="#dddddd" stroke-width="1.5"/>
  <text x="220" y="360" text-anchor="middle" font-size="12" fill="#999999">5. CRM reflects situation</text>
  <text x="220" y="375" text-anchor="middle" font-size="10" fill="#bbbbbb">(stale — hours later)</text>

  <!-- Bottom label left -->
  <text x="220" y="400" text-anchor="middle" font-size="11" fill="#aaaaaa" font-style="italic">System records the aftermath</text>

  <!-- ===== RIGHT COLUMN: Agentic CRM ===== -->

  <!-- Step 1 -->
  <rect x="520" y="80" width="320" height="40" rx="4" fill="#ffffff" stroke="#cccccc" stroke-width="1.5"/>
  <text x="680" y="97" text-anchor="middle" font-size="12" fill="#333333">1. Message → Event</text>
  <text x="680" y="113" text-anchor="middle" font-size="10" fill="#aaaaaa">automatic ingestion</text>
  <line x1="680" y1="120" x2="680" y2="135" stroke="#555555" stroke-width="1.5"/>
  <polygon points="675,135 680,143 685,135" fill="#555555"/>

  <!-- Step 2 -->
  <rect x="520" y="145" width="320" height="40" rx="4" fill="#ffffff" stroke="#cccccc" stroke-width="1.5"/>
  <text x="680" y="162" text-anchor="middle" font-size="12" fill="#333333">2. Event → Evidence</text>
  <text x="680" y="178" text-anchor="middle" font-size="10" fill="#aaaaaa">scored, cited, permission-filtered</text>
  <line x1="680" y1="185" x2="680" y2="200" stroke="#555555" stroke-width="1.5"/>
  <polygon points="675,200 680,208 685,200" fill="#555555"/>

  <!-- Step 3 -->
  <rect x="520" y="210" width="320" height="40" rx="4" fill="#ffffff" stroke="#cccccc" stroke-width="1.5"/>
  <text x="680" y="227" text-anchor="middle" font-size="12" fill="#333333">3. Evidence → Signal</text>
  <text x="680" y="243" text-anchor="middle" font-size="10" fill="#aaaaaa">actionable conclusion</text>
  <line x1="680" y1="250" x2="680" y2="265" stroke="#555555" stroke-width="1.5"/>
  <polygon points="675,265 680,273 685,265" fill="#555555"/>

  <!-- Step 4 -->
  <rect x="520" y="275" width="320" height="40" rx="4" fill="#ffffff" stroke="#cccccc" stroke-width="1.5"/>
  <text x="680" y="292" text-anchor="middle" font-size="12" fill="#333333">4. Signal → Workflow</text>
  <text x="680" y="308" text-anchor="middle" font-size="10" fill="#aaaaaa">triggered automatically</text>
  <line x1="680" y1="315" x2="680" y2="330" stroke="#555555" stroke-width="1.5"/>
  <polygon points="675,330 680,338 685,330" fill="#555555"/>

  <!-- Step 5 (result) -->
  <rect x="520" y="340" width="320" height="40" rx="4" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="680" y="358" text-anchor="middle" font-size="12" fill="#ffffff">5. Summarize · Classify · Update</text>
  <text x="680" y="374" text-anchor="middle" font-size="10" fill="#aaaaaa">Notify · Draft action · Request approval</text>

  <!-- Bottom label right -->
  <text x="680" y="400" text-anchor="middle" font-size="11" fill="#555555" font-style="italic">System participates in real time</text>

</svg>
