<svg xmlns='http://www.w3.org/2000/svg' width='960' height='580' viewBox='0 0 960 580' font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width='960' height='580' fill='#ffffff'/>

  <!-- Title -->
  <text x='480' y='38' text-anchor='middle' font-size='15' font-weight='700' fill='#1a1a1a'>Policy Enforcement: 4 Points in the Execution Path</text>

  <!-- Entry: Agent Request -->
  <rect x='355' y='60' width='250' height='56' rx='6' fill='#f5f5f5' stroke='#cccccc' stroke-width='1.5'/>
  <text x='480' y='85' text-anchor='middle' font-size='13' font-weight='600' fill='#1a1a1a'>Agent Request</text>
  <text x='480' y='104' text-anchor='middle' font-size='10' fill='#888888'>incoming trigger, user context</text>

  <!-- Arrow down -->
  <line x1='480' y1='116' x2='480' y2='144' stroke='#aaaaaa' stroke-width='1.5'/>
  <polygon points='475,144 480,154 485,144' fill='#aaaaaa'/>

  <!-- 1. Retrieval -->
  <rect x='300' y='154' width='360' height='68' rx='6' fill='#ffffff' stroke='#cccccc' stroke-width='1.5'/>
  <text x='380' y='178' text-anchor='middle' font-size='11' font-weight='700' fill='#888888'>1</text>
  <text x='490' y='178' text-anchor='middle' font-size='13' font-weight='600' fill='#1a1a1a'>Retrieval Filter</text>
  <text x='480' y='197' text-anchor='middle' font-size='10' fill='#888888'>RBAC check · PII redact · no-cloud enforcement</text>
  <text x='480' y='212' text-anchor='middle' font-size='10' fill='#888888'>only permitted evidence reaches the prompt</text>

  <!-- Arrow down -->
  <line x1='480' y1='222' x2='480' y2='250' stroke='#aaaaaa' stroke-width='1.5'/>
  <polygon points='475,250 480,260 485,250' fill='#aaaaaa'/>

  <!-- 2. Prompt Building -->
  <rect x='300' y='260' width='360' height='68' rx='6' fill='#ffffff' stroke='#cccccc' stroke-width='1.5'/>
  <text x='380' y='284' text-anchor='middle' font-size='11' font-weight='700' fill='#888888'>2</text>
  <text x='490' y='284' text-anchor='middle' font-size='13' font-weight='600' fill='#1a1a1a'>Prompt Building</text>
  <text x='480' y='303' text-anchor='middle' font-size='10' fill='#888888'>sensitivity labels travel with evidence</text>
  <text x='480' y='318' text-anchor='middle' font-size='10' fill='#888888'>what is included, redacted, or withheld is a policy decision</text>

  <!-- Arrow down -->
  <line x1='480' y1='328' x2='480' y2='356' stroke='#aaaaaa' stroke-width='1.5'/>
  <polygon points='475,356 480,366 485,356' fill='#aaaaaa'/>

  <!-- 3. Tool Execution -->
  <rect x='300' y='366' width='360' height='68' rx='6' fill='#ffffff' stroke='#cccccc' stroke-width='1.5'/>
  <text x='380' y='390' text-anchor='middle' font-size='11' font-weight='700' fill='#888888'>3</text>
  <text x='490' y='390' text-anchor='middle' font-size='13' font-weight='600' fill='#1a1a1a'>Tool Execution</text>
  <text x='480' y='409' text-anchor='middle' font-size='10' fill='#888888'>schema · permissions · rate limit · idempotency</text>
  <text x='480' y='424' text-anchor='middle' font-size='10' fill='#888888'>model proposes · validator decides · deny is logged</text>

  <!-- Arrow down -->
  <line x1='480' y1='434' x2='480' y2='462' stroke='#aaaaaa' stroke-width='1.5'/>
  <polygon points='475,462 480,472 485,462' fill='#aaaaaa'/>

  <!-- 4. Output Formatting (dark) -->
  <rect x='300' y='472' width='360' height='68' rx='6' fill='#1a1a1a' stroke='#1a1a1a' stroke-width='1.5'/>
  <text x='380' y='496' text-anchor='middle' font-size='11' font-weight='700' fill='#666666'>4</text>
  <text x='490' y='496' text-anchor='middle' font-size='13' font-weight='600' fill='#ffffff'>Output Formatting</text>
  <text x='480' y='515' text-anchor='middle' font-size='10' fill='#aaaaaa'>same agent · same question · different users</text>
  <text x='480' y='530' text-anchor='middle' font-size='10' fill='#aaaaaa'>different outputs · by design</text>

  <!-- Deny path label (right side) -->
  <text x='690' y='210' text-anchor='start' font-size='10' fill='#cc4444'>deny + log</text>
  <text x='690' y='320' text-anchor='start' font-size='10' fill='#cc4444'>deny + log</text>
  <text x='690' y='416' text-anchor='start' font-size='10' fill='#cc4444'>deny + log</text>

</svg>