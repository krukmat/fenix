components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AnyResponse:
      type: object
      additionalProperties: true
    KnowledgeIngestRequest:
      type: object
      required:
      - sourceType
      - title
      - rawContent
      properties:
        sourceSystem:
          type: string
        sourceType:
          type: string
          enum: [document, email, call, note, case, ticket, kb_article, api, other]
        sourceObjectId:
          type: string
        refreshStrategy:
          type: string
        deleteBehavior:
          type: string
        permissionContext:
          type: string
        title:
          type: string
        rawContent:
          type: string
        entityType:
          type: string
        entityId:
          type: string
        metadata:
          type: string
    KnowledgeIngestResponse:
      type: object
      required:
      - id
      - workspaceId
      - sourceType
      - title
      - createdAt
      properties:
        id:
          type: string
        workspaceId:
          type: string
        sourceSystem:
          type: string
        sourceType:
          type: string
        sourceObjectId:
          type: string
        refreshStrategy:
          type: string
        deleteBehavior:
          type: string
        permissionContext:
          type: string
        title:
          type: string
        entityType:
          type: string
        entityId:
          type: string
        createdAt:
          type: string
    Meta:
      type: object
    ErrorResponse:
      type: object
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
    Offset:
      name: offset
      in: query
      schema:
        type: integer
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
    StageID:
      name: stage_id
      in: path
      required: true
      schema:
        type: string
    EntityType:
      name: entity_type
      in: path
      required: true
      schema:
        type: string
    EntityID:
      name: entity_id
      in: path
      required: true
      schema:
        type: string
    AccountID:
      name: account_id
      in: path
      required: true
      schema:
        type: string
