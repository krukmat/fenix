# CI Workflow for FenixCRM
# Task 1.1: Project Setup + Complexity gate added post Task 1.3
# Following implementation plan exactly - Section 6 (Testing Strategy)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  mobile-quality:
    name: Mobile Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: |
          cd mobile
          npm ci --legacy-peer-deps

      - name: Typecheck (mobile)
        run: |
          cd mobile
          npm run typecheck

      - name: Lint (mobile)
        run: |
          cd mobile
          npm run lint

      - name: Architecture checks (mobile)
        run: |
          cd mobile
          npm run quality:arch

      - name: Coverage gate (mobile)
        run: |
          cd mobile
          npm run test:coverage

  # Job 1: Cyclomatic Complexity Gate — blocks merge if any function exceeds threshold 7
  # This job must pass before lint and tests can run.
  complexity:
    name: Complexity Gate (max 7)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install gocyclo
        run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest

      - name: Check cyclomatic complexity
        # Scans only production code (*_test.go excluded — tests legitimately have more branches).
        # gocyclo exits with code 1 when violations found — causes this step to fail, blocking merge.
        # Threshold 7: industry standard for maintainable, testable functions.
        run: |
          set -euo pipefail
          echo "=== Cyclomatic Complexity Report (threshold: 7, production code only) ==="

          # Use xargs + null delimiters to pass files correctly to gocyclo.
          # This avoids treating all files as a single path (which can cause false PASS).
          VIOLATIONS=$(find ./internal -name '*.go' ! -name '*_test.go' -print0 \
            | xargs -0 gocyclo -over 7 \
            | grep -v "^Average:" || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "$VIOLATIONS"
            echo ""
            echo "FAILED: functions above threshold 7 found — refactor before merging"
            exit 1
          else
            echo "PASSED: all production functions at or below threshold 7"
          fi

  traceability:
    name: Traceability Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Create venv and install Doorstop
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install doorstop

      - name: Doorstop integrity check
        run: make doorstop-check

      - name: FR-to-test traceability check
        run: make trace-check

  # Job 2: Lint, Test, Build — only runs if complexity gate passes
  test:
    name: Lint and Test
    needs: [mobile-quality, complexity, traceability]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install golangci-lint
        run: |
          # v1.55.2 is not compatible with Go 1.24 typecheck in this project.
          # Keep linter version aligned with current Go toolchain used in CI.
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.64.8

      - name: Setup Node.js (for jscpd in pattern gate)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pattern opportunities gate (warn mode)
        run: make pattern-opportunities-gate PATTERN_GATE_MODE=warn PATTERN_GATE_TS_DUP_THRESHOLD=2

      - name: Show lint gates (gocognit + maintidx)
        run: |
          set -euo pipefail
          echo "golangci-lint version:"
          golangci-lint --version
          echo ""
          echo "Configured gates in .golangci.yml:"
          grep -En "gocognit|maintidx" .golangci.yml
          echo ""
          echo "Installed linters (filtered):"
          golangci-lint linters | grep -Ei "gocognit|maintidx"

      - name: Gate gocognit (explicit)
        run: golangci-lint run --enable-only=gocognit ./...

      - name: Gate maintidx (explicit)
        run: golangci-lint run --enable-only=maintidx ./...

      - name: Run linter
        run: golangci-lint run ./...

      - name: Run tests
        run: make test

      - name: Race stability gate
        run: make race-stability

      - name: Global coverage gate
        run: COVERAGE_MIN=79 make coverage-gate

      - name: App coverage gate
        run: COVERAGE_APP_MIN=79 make coverage-app-gate

      - name: TDD coverage gate
        run: TDD_COVERAGE_MIN=79 make coverage-tdd

      - name: Build binary
        run: make build

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  # Job 3: Detox E2E Tests (Android emulator + Go backend + BFF)
  # Task 4.8 — runs 4 critical mobile flows on real emulator
  e2e-detox:
    name: Detox E2E (Android)
    needs: [test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      # --- Start backends (Go + BFF) ---
      - name: Build Go backend
        run: make build

      - name: Start Go backend
        run: |
          JWT_SECRET="ci-test-secret-key-32-chars-min!!!" \
          ./fenix serve --port 8080 &
          sleep 3

      - name: Install & start BFF
        run: |
          cd bff && npm ci && npm run build
          BACKEND_URL=http://localhost:8080 PORT=3000 node dist/server.js &
          sleep 2

      # --- Android emulator + Detox ---
      - name: Install mobile dependencies
        run: cd mobile && npm ci --legacy-peer-deps

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Detox build (APK + test runner)
        run: |
          cd mobile
          cp .env.e2e .env
          npx expo prebuild --platform android --clean
          cd android
          ./gradlew assembleDebug assembleAndroidTest -DtestBuildType=debug --init-script ../init.gradle

      - name: Detox test (Android emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          avd-name: Pixel_7_API_33
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            cd mobile
            npx detox test --configuration android.emu.debug --headless --record-logs failing --take-screenshots failing

      - name: Upload Detox artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts
          path: mobile/artifacts/

  contract:
    name: API Contract Tests
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Create venv and install Schemathesis + Doorstop
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install schemathesis doorstop

      - name: Run contract tests (strict)
        run: make contract-test-strict
