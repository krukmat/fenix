# CI Workflow for FenixCRM
# Task 1.1: Project Setup + Complexity gate added post Task 1.3
# Following implementation plan exactly - Section 6 (Testing Strategy)

name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * *'

jobs:
  mobile-quality:
    name: Mobile Quality Gates
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: |
          cd mobile
          npm ci --legacy-peer-deps

      - name: Typecheck (mobile)
        run: |
          cd mobile
          npm run typecheck

      - name: Lint (mobile)
        run: |
          cd mobile
          npm run lint

      - name: Architecture checks (mobile)
        run: |
          cd mobile
          npm run quality:arch

      - name: Coverage gate (mobile)
        run: |
          cd mobile
          npm run test:coverage

  # Job 1: Cyclomatic Complexity Gate — blocks merge if any function exceeds threshold 7
  # This job must pass before lint and tests can run.
  complexity:
    name: Complexity Gate (max 7)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true

      - name: Install gocyclo
        run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest

      - name: Check cyclomatic complexity
        # Scans only production code (*_test.go excluded — tests legitimately have more branches).
        # gocyclo exits with code 1 when violations found — causes this step to fail, blocking merge.
        # Threshold 7: industry standard for maintainable, testable functions.
        run: |
          set -euo pipefail
          echo "=== Cyclomatic Complexity Report (threshold: 7, production code only) ==="

          # Use xargs + null delimiters to pass files correctly to gocyclo.
          # This avoids treating all files as a single path (which can cause false PASS).
          VIOLATIONS=$(find ./internal -name '*.go' ! -name '*_test.go' -print0 \
            | xargs -0 gocyclo -over 7 \
            | grep -v "^Average:" || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "$VIOLATIONS"
            echo ""
            echo "FAILED: functions above threshold 7 found — refactor before merging"
            exit 1
          else
            echo "PASSED: all production functions at or below threshold 7"
          fi

  traceability:
    name: Traceability Gate
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true

      - name: Create venv and install Doorstop
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install doorstop

      - name: Doorstop integrity check
        run: make doorstop-check

      - name: BDD traceability check
        run: make bdd-trace-check

  # Job 1.5: Check no inline eslint-disable comments
  no-inline-disable-gate:
    name: No Inline ESLint Disable
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check no inline eslint-disable
        run: bash scripts/check-no-inline-eslint-disable.sh

  # Job 2: Lint, Test, Build — only runs if complexity gate passes
  test:
    name: Lint and Test
    if: github.event_name != 'schedule'
    needs: [mobile-quality, complexity, traceability, no-inline-disable-gate]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true

      - name: Install golangci-lint
        run: |
          # Install via go install so the binary is compiled with the same Go toolchain as CI (Go 1.25.8).
          # The curl/sh binary installer ships a pre-built binary compiled with Go 1.24, which rejects
          # modules declaring go 1.25.0 (our go.mod was bumped to 1.25.0 by mcp go-sdk v1.4.1).
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Setup Node.js (for jscpd in pattern gate)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pattern opportunities gate (strict mode)
        run: make pattern-opportunities-gate PATTERN_GATE_MODE=strict PATTERN_GATE_TS_DUP_THRESHOLD=5

      - name: Show lint gates (gocognit + maintidx)
        run: |
          set -euo pipefail
          echo "golangci-lint version:"
          golangci-lint --version
          echo ""
          echo "Configured gates in .golangci.yml:"
          grep -En "gocognit|maintidx" .golangci.yml
          echo ""
          echo "Installed linters (filtered):"
          golangci-lint linters | grep -Ei "gocognit|maintidx"

      - name: Run linter
        run: golangci-lint run ./...

      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Dead code gate (blocking)
        run: |
          go install golang.org/x/tools/cmd/deadcode@latest
          # Scan all packages with -test so internal test helpers count as reachable.
          # MCP Gateway is deferred (no MCPResourceProvider implementation yet — P1 infra).
          deadcode -test ./... 2>&1 \
            | grep -v "mcp_adapter\|MCPGateway\|BuildServer\|MCPResourceProvider\|MCPResourceDescriptor\|MCPResourcePayload" \
            | grep -v "_test\.go:\|ruleguard" \
            | tee deadcode-report.txt || true
          LINES=$(grep -c "." deadcode-report.txt 2>/dev/null || echo 0)
          echo "Dead code findings (after MCP allowlist): $LINES"
          if [ "$LINES" -gt 0 ]; then
            echo "::error::$LINES unexpected dead code finding(s) — see deadcode-report artifact"
            exit 1
          fi
          echo "Dead code gate: PASSED"

      - name: Upload dead code report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deadcode-report-${{ github.sha }}
          path: deadcode-report.txt

      - name: Run tests
        run: make test

      - name: Run Go BDD baseline
        run: make test-bdd-go

      - name: Race stability gate
        run: RACE_STABILITY_COUNT=3 make race-stability

      - name: Coverage gate
        run: COVERAGE_MIN=83 make coverage-gate

      - name: TDD coverage gate
        run: TDD_COVERAGE_MIN=83 make coverage-tdd

      - name: Build binary
        run: make build

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
          fail_ci_if_error: false

      - name: Agent attribution
        id: attribution
        run: |
          AGENTS=$(git log -1 --format="%B" | grep "^AI-Agent:" | sed 's/^AI-Agent: //' | paste -sd ',' || echo "human")
          if [ -z "$AGENTS" ]; then AGENTS="human"; fi
          echo "agents=$AGENTS" >> $GITHUB_OUTPUT
          echo "Commit attributed to: $AGENTS"

      - name: Save quality snapshot
        run: |
          AGENTS="${{ steps.attribution.outputs.agents }}"
          COMMIT=$(git rev-parse --short HEAD)
          COVERAGE=$(go tool cover -func=coverage_app.out 2>/dev/null | awk '/^total:/ {gsub("%","",$$3); print $$3}' || echo "0")
          cat > quality-snapshot.json <<EOF
          {
            "commit": "$COMMIT",
            "agents": "$AGENTS",
            "coverage": $COVERAGE,
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat quality-snapshot.json

      - name: Upload quality snapshot
        uses: actions/upload-artifact@v4
        with:
          name: quality-snapshot-${{ github.sha }}
          path: quality-snapshot.json

  benchmark-critical:
    name: Critical Endpoint Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true

      - name: Run critical endpoint benchmarks
        run: |
          set -euo pipefail
          make bench-critical BENCH_BENCHTIME=5x | tee benchmark-critical.txt

      - name: Upload critical benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-critical-${{ github.sha }}
          path: benchmark-critical.txt

  benchmark-all-scheduled:
    name: Scheduled Endpoint Benchmarks
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true

      - name: Run scheduled endpoint benchmarks
        run: |
          set -euo pipefail
          make bench-all BENCH_BENCHTIME=5x | tee benchmark-all.txt

      - name: Upload scheduled benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-all-${{ github.run_id }}
          path: benchmark-all.txt

  contract:
    name: API Contract Tests
    if: github.event_name != 'schedule'
    needs: [test, benchmark-critical]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true

      - name: Create venv and install Schemathesis + Doorstop
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install schemathesis doorstop

      - name: Run contract tests (strict)
        run: make contract-test-strict
