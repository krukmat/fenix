text: |
  FR-304: CRM List Centralized CRUD and Bulk Delete
  List screens are the single operational surface for create, edit, and delete of CRM
  entities (Account, Contact, Lead, Deal, Case). Multi-selection with always-visible
  checkboxes, per-row edit navigation, bulk delete with confirmation and partial-failure
  handling, and read-only detail screens.
