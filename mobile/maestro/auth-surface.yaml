# docs/plans/maestro-screenshot-auth-bypass-plan.md — Phase 1: Auth surface
# Purpose: cold-launch the app from a cleared state and capture the login
# screen as-is. No text input, no submit — the screenshot runner replaces
# login UI interaction with an e2e-bootstrap deep link in Phase 2.
appId: com.fenixcrm.app
name: Visual Audit - FenixCRM Auth Surface
tags:
  - screenshots
  - visual-audit
  - auth-surface

---

# BFF-ADMIN-J4: dismiss Android ANR dialog (may reappear; loop up to 8 times)
- repeat:
    times: 8
    commands:
      - runFlow:
          when:
            visible:
              text: "Process system isn't responding"
          commands:
            - tapOn:
                text: "Wait"
            - waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 120000
- assertVisible:
    id: "login-screen"
- takeScreenshot:
    path: "01_auth_login"
