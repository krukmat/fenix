# docs/plans/maestro-screenshot-auth-bypass-plan.md — Phase 1: Auth surface
# Purpose: cold-launch the app from a cleared state and capture the login
# screen as-is. No text input, no submit — the screenshot runner replaces
# login UI interaction with an e2e-bootstrap deep link in Phase 2.
appId: com.fenixcrm.app
name: Visual Audit - FenixCRM Auth Surface
tags:
  - screenshots
  - visual-audit
  - auth-surface

---

- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 120000
- assertVisible:
    id: "login-screen"
- takeScreenshot:
    path: "01_auth_login"
