# W6-T3: Wedge-first Maestro visual audit
# Covers: Auth → Inbox → Support → Sales → Activity Log → Governance
# Seed variables injected by seed-and-run.sh
appId: com.fenixcrm.app
name: Visual Audit - FenixCRM Wedge
tags:
  - screenshots
  - visual-audit

---

# ── 1. Auth ───────────────────────────────────────────────────────────────────

- launchApp
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 120000
- assertVisible:
    id: "login-screen"
- takeScreenshot:
    path: "01_auth_login"

- tapOn:
    id: "go-to-register-link"
- extendedWaitUntil:
    visible:
      id: "register-email-input"
    timeout: 20000
- takeScreenshot:
    path: "02_auth_register"

- tapOn:
    id: "go-to-login-link"
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 20000
- tapOn:
    id: "login-email-input"
- eraseText
- inputText: ${SEED_EMAIL}
- tapOn:
    id: "login-password-input"
- eraseText
- inputText: ${SEED_PASSWORD}
- hideKeyboard
- tapOn:
    id: "login-submit-button"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: "inbox-screen"
    timeout: 120000

# ── 2. Inbox ──────────────────────────────────────────────────────────────────

- assertVisible:
    id: "inbox-screen"
- takeScreenshot:
    path: "03_inbox"

# Approval card
- runFlow:
    when:
      visible:
        id: "inbox-approval-${SEED_APPROVAL_ID}"
    commands:
      - tapOn:
          id: "inbox-approval-${SEED_APPROVAL_ID}"
      - extendedWaitUntil:
          visible:
            id: "approval-card"
          timeout: 15000
      - takeScreenshot:
          path: "04_inbox_approval_detail"
      - back

# ── 3. Support ────────────────────────────────────────────────────────────────

- tapOn:
    id: "tab-support"
- extendedWaitUntil:
    visible:
      id: "support-screen"
    timeout: 15000
- takeScreenshot:
    path: "05_support_list"

- runFlow:
    when:
      visible:
        id: "support-case-item-0"
    commands:
      - tapOn:
          id: "support-case-item-0"
      - extendedWaitUntil:
          visible:
            id: "support-case-detail-screen"
          timeout: 15000
      - takeScreenshot:
          path: "06_support_case_detail"

      # Copilot from case detail
      - runFlow:
          when:
            visible:
              id: "support-copilot-button"
          commands:
            - tapOn:
                id: "support-copilot-button"
            - extendedWaitUntil:
                visible:
                  id: "copilot-panel"
                timeout: 15000
            - takeScreenshot:
                path: "07_support_copilot"
            - back

      - back

# ── 4. Sales ──────────────────────────────────────────────────────────────────

- tapOn:
    id: "tab-sales"
- extendedWaitUntil:
    visible:
      id: "sales-screen"
    timeout: 15000
- takeScreenshot:
    path: "08_sales_accounts_tab"

# Account detail
- runFlow:
    when:
      visible:
        id: "sales-account-item-0"
    commands:
      - tapOn:
          id: "sales-account-item-0"
      - extendedWaitUntil:
          visible:
            id: "sales-account-detail-screen"
          timeout: 15000
      - takeScreenshot:
          path: "09_sales_account_detail"

      # Sales Brief
      - runFlow:
          when:
            visible:
              id: "sales-brief-button"
          commands:
            - tapOn:
                id: "sales-brief-button"
            - extendedWaitUntil:
                visible:
                  id: "sales-brief-screen"
                timeout: 20000
            - takeScreenshot:
                path: "10_sales_brief"
            - back

      - back

# Deals tab
- tapOn:
    id: "sales-tab-deals"
- extendedWaitUntil:
    visible:
      id: "sales-screen"
    timeout: 10000
- takeScreenshot:
    path: "11_sales_deals_tab"

- runFlow:
    when:
      visible:
        id: "sales-deal-item-0"
    commands:
      - tapOn:
          id: "sales-deal-item-0"
      - extendedWaitUntil:
          visible:
            id: "sales-deal-detail-screen"
          timeout: 15000
      - takeScreenshot:
          path: "12_sales_deal_detail"
      - back

# ── 5. Activity Log ───────────────────────────────────────────────────────────

- tapOn:
    id: "tab-activity"
- extendedWaitUntil:
    visible:
      id: "activity-log-screen"
    timeout: 15000
- takeScreenshot:
    path: "13_activity_all"

# Filter: completed
- tapOn:
    id: "filter-completed"
- extendedWaitUntil:
    visible:
      id: "activity-log-screen"
    timeout: 10000
- takeScreenshot:
    path: "14_activity_filter_completed"

# Run detail — completed run
- runFlow:
    when:
      visible:
        id: "activity-run-item-${SEED_RUN_COMPLETED_ID}"
    commands:
      - tapOn:
          id: "activity-run-item-${SEED_RUN_COMPLETED_ID}"
      - extendedWaitUntil:
          visible:
            id: "activity-run-detail-screen"
          timeout: 15000
      - takeScreenshot:
          path: "15_activity_run_detail_completed"
      - back

# Filter: awaiting_approval — reset to all first
- tapOn:
    id: "filter-all"
- tapOn:
    id: "filter-failed"
- extendedWaitUntil:
    visible:
      id: "activity-log-screen"
    timeout: 10000
- takeScreenshot:
    path: "16_activity_filter_denied"

# Run detail — denied by policy
- runFlow:
    when:
      visible:
        id: "activity-run-item-${SEED_RUN_DENIED_ID}"
    commands:
      - tapOn:
          id: "activity-run-item-${SEED_RUN_DENIED_ID}"
      - extendedWaitUntil:
          visible:
            id: "activity-run-detail-screen"
          timeout: 15000
      - takeScreenshot:
          path: "17_activity_run_detail_denied"
      - back

# ── 6. Governance ─────────────────────────────────────────────────────────────

- tapOn:
    id: "tab-governance"
- extendedWaitUntil:
    visible:
      id: "governance-screen"
    timeout: 15000
- takeScreenshot:
    path: "18_governance"

- runFlow:
    when:
      visible:
        id: "governance-quota-item-0"
    commands:
      - takeScreenshot:
          path: "19_governance_quota"
