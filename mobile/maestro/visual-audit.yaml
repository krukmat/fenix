    timeout: 15000
- takeScreenshot:
    path: "20_workflows_list"
- tapOn:
    id: "workflows-new-btn"
- extendedWaitUntil:
    visible:
      id: "workflow-new-screen"
    timeout: 15000
- takeScreenshot:
    path: "21_workflow_new"
- back
- scrollUntilVisible:
    element:
      id: "workflow-${SEED_WORKFLOW_ACTIVE_ID}"
    direction: DOWN
    timeout: 30000
- tapOn:
    id: "workflow-${SEED_WORKFLOW_ACTIVE_ID}"
- extendedWaitUntil:
    visible:
