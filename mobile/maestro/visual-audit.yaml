# F4-T2: Core 5 Maestro visual audit
# Covers: Login → Inbox → Support → Sales Brief → Governance
# Seed variables injected by seed-and-run.sh
appId: com.fenixcrm.app
name: Visual Audit - FenixCRM Core 5
tags:
  - screenshots
  - visual-audit

---

# ── 1. Login ──────────────────────────────────────────────────────────────────

- launchApp
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 120000
- assertVisible:
    id: "login-screen"
- takeScreenshot:
    path: "01_auth_login"

- tapOn:
    id: "login-email-input"
- eraseText
- inputText: ${SEED_EMAIL}
- tapOn:
    id: "login-password-input"
- eraseText
- inputText: ${SEED_PASSWORD}
- hideKeyboard
- tapOn:
    id: "login-submit-button"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: "inbox-screen"
    timeout: 120000

# ── 2. Inbox ──────────────────────────────────────────────────────────────────

- assertVisible:
    id: "inbox-screen"
- takeScreenshot:
    path: "02_inbox"

- runFlow:
    when:
      visible:
        id: "inbox-approval-${SEED_APPROVAL_ID}"
    commands:
      - takeScreenshot:
          path: "06_inbox_approval_inline"

- runFlow:
    when:
      visible:
        id: "inbox-handoff-${SEED_RUN_HANDOFF_ID}"
    commands:
      - takeScreenshot:
          path: "07_inbox_handoff"

# ── 3. Support ────────────────────────────────────────────────────────────────

- tapOn:
    id: "tab-support"
- extendedWaitUntil:
    visible:
      id: "support-cases-list-item-0"
    timeout: 20000
- tapOn:
    id: "support-cases-list-item-0"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: "support-case-detail-screen"
    timeout: 20000
- takeScreenshot:
    path: "03_support_case_detail"

# ── 4. Sales ──────────────────────────────────────────────────────────────────

- tapOn:
    id: "tab-sales"
- extendedWaitUntil:
    visible:
      id: "sales-screen"
    timeout: 20000
- tapOn:
    id: "sales-tab-deals"
- extendedWaitUntil:
    visible:
      id: "sales-deal-item-0"
    timeout: 20000
- tapOn:
    id: "sales-deal-item-0"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: "sales-deal-detail-screen"
    timeout: 20000
- tapOn:
    id: "sales-deal-brief-button"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: "sales-brief-screen"
    timeout: 30000
- takeScreenshot:
    path: "04_sales_brief"

# ── 5. Activity (Denied Trace) ────────────────────────────────────────────────

- openLink: "fenixcrm:///activity/${SEED_RUN_DENIED_ID}"
- extendedWaitUntil:
    visible:
      id: "activity-run-detail-screen"
    timeout: 20000
- takeScreenshot:
    path: "08_activity_run_detail_denied"

# ── 6. Governance ─────────────────────────────────────────────────────────────

- openLink: "fenixcrm:///governance"
- extendedWaitUntil:
    visible:
      id: "governance-screen"
    timeout: 20000
- takeScreenshot:
    path: "05_governance"
