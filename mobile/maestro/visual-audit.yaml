# W6-T3: Wedge-first Maestro visual audit
# Covers: Auth → Inbox → Support → Sales → Activity Log → Governance
# Seed variables injected by seed-and-run.sh
appId: com.fenixcrm.app
name: Visual Audit - FenixCRM Wedge
tags:
  - screenshots
  - visual-audit

---

# ── 1. Auth ───────────────────────────────────────────────────────────────────

- launchApp
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 120000
- assertVisible:
    id: "login-screen"
- takeScreenshot:
    path: "01_auth_login"

- tapOn:
    id: "go-to-register-link"
- extendedWaitUntil:
    visible:
      id: "register-email-input"
    timeout: 20000
- takeScreenshot:
    path: "02_auth_register"

- tapOn:
    id: "go-to-login-link"
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 20000
- tapOn:
    id: "login-email-input"
- eraseText
- inputText: ${SEED_EMAIL}
- tapOn:
    id: "login-password-input"
- eraseText
- inputText: ${SEED_PASSWORD}
- hideKeyboard
- tapOn:
    id: "login-submit-button"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: "inbox-screen"
    timeout: 120000

# ── 2. Inbox ──────────────────────────────────────────────────────────────────

- assertVisible:
    id: "inbox-screen"
- takeScreenshot:
    path: "03_inbox"

# Approval card — inline action card in the real Inbox queue
- runFlow:
    when:
      visible:
        id: "inbox-approval-${SEED_APPROVAL_ID}"
    commands:
      - assertVisible:
          id: "inbox-approval-${SEED_APPROVAL_ID}-approve"
      - takeScreenshot:
          path: "04_inbox_approval_inline"

# Handoff card — corrected wedge routing assumptions
- runFlow:
    when:
      visible:
        id: "inbox-handoff-${SEED_RUN_HANDOFF_ID}"
    commands:
      - takeScreenshot:
          path: "05_inbox_handoff"

# ── 3. Support ────────────────────────────────────────────────────────────────

- tapOn:
    text: "Support"
- extendedWaitUntil:
    visible:
      id: "support-cases-list"
    timeout: 15000
- takeScreenshot:
    path: "06_support_list"

# ── 4. Sales ──────────────────────────────────────────────────────────────────

- tapOn:
    text: "Sales"
- extendedWaitUntil:
    visible:
      id: "sales-screen"
    timeout: 15000
- takeScreenshot:
    path: "09_sales_accounts_tab"

# Deals tab
- tapOn:
    text: "Deals"
- extendedWaitUntil:
    visible:
      id: "sales-screen"
    timeout: 10000
- takeScreenshot:
    path: "12_sales_deals_tab"

# ── 5. Activity Log ───────────────────────────────────────────────────────────

- tapOn:
    text: "Activity"
- extendedWaitUntil:
    visible:
      id: "activity-log-screen"
    timeout: 15000
- takeScreenshot:
    path: "14_activity_all"

# Filter: completed
- tapOn:
    id: "filter-completed"
- extendedWaitUntil:
    visible:
      id: "activity-log-screen"
    timeout: 10000
- takeScreenshot:
    path: "15_activity_filter_completed"

# ── 6. Governance ─────────────────────────────────────────────────────────────

- tapOn:
    text: "Governance"
- extendedWaitUntil:
    visible:
      id: "governance-screen"
    timeout: 15000
- takeScreenshot:
    path: "19_governance"
