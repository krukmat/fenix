- retry:
    maxRetries: 2
    commands:
      - tapOn:
          id: "drawer-open-button"
          retryTapIfNoChange: true
      - assertVisible:
          id: "drawer-content"
- tapOn:
    id: "drawer-activity-tab"
- extendedWaitUntil:
    visible:
      id: "agent-runs-list-screen"
    timeout: 15000
- takeScreenshot:
    path: "24_agents_list"
- scrollUntilVisible:
    element:
      id: "agent-run-item-${SEED_AGENT_RUN_REJECTED_ID}"
    direction: DOWN
    timeout: 30000
- tapOn:
