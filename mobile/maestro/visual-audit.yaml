appId: com.fenixcrm.app
name: Visual Audit - FenixCRM Mobile
tags:
  - screenshots
  - visual-audit
env:
  SEED_SIGNAL_ID: ""

---
- launchApp
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 120000
- assertVisible:
    id: "login-screen"
- takeScreenshot:
    path: "01_auth_login"

- tapOn:
    id: "go-to-register-link"
- extendedWaitUntil:
    visible:
      id: "register-email-input"
    timeout: 20000
- takeScreenshot:
    path: "02_auth_register"

- tapOn:
    id: "go-to-login-link"
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 20000
- tapOn:
    id: "login-email-input"
- eraseText
- inputText: ${SEED_EMAIL}
- tapOn:
    id: "login-password-input"
- eraseText
- inputText: ${SEED_PASSWORD}
- hideKeyboard
- tapOn:
    id: "login-submit-button"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: "home-feed"
    timeout: 120000
- takeScreenshot:
    path: "03_home_feed"

- tapOn:
    id: "home-feed-chip-signals"
- runFlow:
    when:
      true: ${SEED_SIGNAL_ID != ""}
    commands:
      - scrollUntilVisible:
          element:
            id: "home-feed-signal-${SEED_SIGNAL_ID}"
          direction: DOWN
          timeout: 30000
      - tapOn:
          id: "home-feed-signal-${SEED_SIGNAL_ID}"
      - extendedWaitUntil:
          visible:
            id: "signal-detail"
          timeout: 15000
      - takeScreenshot:
          path: "04_home_signal_detail"
      - back
- runFlow:
    when:
      true: ${SEED_SIGNAL_ID == ""}
    commands:
      - runFlow:
          when:
            visible:
              id: "home-feed-empty"
          commands:
            - takeScreenshot:
                path: "04_home_signal_detail_EMPTY"

- retry:
    maxRetries: 2
    commands:
      - tapOn:
          id: "drawer-open-button"
          retryTapIfNoChange: true
      - assertVisible:
          id: "drawer-content"
- runFlow:
    when:
      notVisible:
        id: "drawer-crm-submenu"
    commands:
      - tapOn:
          id: "drawer-crm-tab"
          retryTapIfNoChange: true
- assertVisible:
    id: "drawer-crm-submenu"
- takeScreenshot:
    path: "05_crm_hub"

- tapOn:
    id: "drawer-crm-accounts"
- extendedWaitUntil:
    visible:
      id: "accounts-list"
    timeout: 15000
- takeScreenshot:
    path: "06_crm_accounts_list"
- tapOn:
    id: "accounts-list-item-0"
- extendedWaitUntil:
    visible:
      id: "account-detail-screen"
    timeout: 15000
- takeScreenshot:
    path: "07_crm_account_detail"
- back
- extendedWaitUntil:
    visible:
      id: "accounts-list"
    timeout: 15000
- tapOn:
    id: "create-account-fab"
- extendedWaitUntil:
    visible:
      id: "account-form-screen"
    timeout: 15000
- takeScreenshot:
    path: "08_crm_account_new"
- back

- retry:
    maxRetries: 2
    commands:
      - tapOn:
          id: "drawer-open-button"
          retryTapIfNoChange: true
      - assertVisible:
          id: "drawer-content"
- runFlow:
    when:
      notVisible:
        id: "drawer-crm-submenu"
    commands:
      - tapOn:
          id: "drawer-crm-tab"
          retryTapIfNoChange: true
- tapOn:
    id: "drawer-crm-contacts"
- extendedWaitUntil:
    visible:
      id: "contacts-list"
    timeout: 15000
- takeScreenshot:
    path: "09_crm_contacts_list"
- tapOn:
    id: "contacts-search"
- eraseText
- inputText: ${SEED_CONTACT_EMAIL}
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "contact-item-${SEED_CONTACT_ID}"
    timeout: 15000
- tapOn:
    id: "contact-item-${SEED_CONTACT_ID}"
- extendedWaitUntil:
    visible:
      id: "contact-detail-header"
    timeout: 15000
- takeScreenshot:
    path: "10_crm_contact_detail"
- back

- retry:
    maxRetries: 2
