    timeout: 15000
- takeScreenshot:
    path: "11_crm_deals_list"
- scrollUntilVisible:
    element:
      id: "deal-item-${SEED_DEAL_ID}"
    direction: DOWN
    timeout: 30000
- tapOn:
    id: "deal-item-${SEED_DEAL_ID}"
- extendedWaitUntil:
    visible:
      id: "deal-detail-screen"
    timeout: 15000
- takeScreenshot:
    path: "12_crm_deal_detail"
- back
- extendedWaitUntil:
    visible:
      id: "deals-list"
    timeout: 15000
- tapOn:
    id: "create-deal-fab"
- extendedWaitUntil:
    visible:
      id: "deal-new-screen"
    timeout: 15000
- takeScreenshot:
    path: "13_crm_deal_new"
- back
- scrollUntilVisible:
    element:
      id: "deal-item-${SEED_DEAL_ID}"
    direction: DOWN
    timeout: 30000
- tapOn:
    id: "deal-item-${SEED_DEAL_ID}"
- extendedWaitUntil:
    visible:
      id: "deal-detail-screen"
    timeout: 15000
- tapOn:
    id: "deal-edit-button"
- extendedWaitUntil:
    visible:
      id: "deal-edit-screen"
    timeout: 15000
- takeScreenshot:
    path: "14_crm_deal_edit"
- back
- back

- retry:
    maxRetries: 2
    commands:
      - tapOn:
          id: "drawer-open-button"
          retryTapIfNoChange: true
      - assertVisible:
          id: "drawer-content"
- runFlow:
    when:
      notVisible:
        id: "drawer-crm-submenu"
    commands:
      - tapOn:
          id: "drawer-crm-tab"
          retryTapIfNoChange: true
- tapOn:
    id: "drawer-crm-cases"
- extendedWaitUntil:
    visible:
      id: "cases-list"
    timeout: 15000
- takeScreenshot:
    path: "15_crm_cases_list"
- tapOn:
    id: "cases-search"
- eraseText
- inputText: ${SEED_CASE_SUBJECT}
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "cases-list-item-0"
    timeout: 15000
- tapOn:
    id: "cases-list-item-0"
- extendedWaitUntil:
    visible:
      id: "case-detail-screen"
    timeout: 15000
- takeScreenshot:
    path: "16_crm_case_detail"
- back
- extendedWaitUntil:
    visible:
      id: "cases-list"
    timeout: 15000
- tapOn:
    id: "create-case-fab"
- extendedWaitUntil:
    visible:
      id: "case-new-screen"
    timeout: 15000
- takeScreenshot:
    path: "17_crm_case_new"
- back
- tapOn:
    id: "cases-search"
- eraseText
- inputText: ${SEED_CASE_SUBJECT}
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: "cases-list-item-0"
    timeout: 15000
- tapOn:
    id: "cases-list-item-0"
- extendedWaitUntil:
    visible:
      id: "case-detail-screen"
    timeout: 15000
- tapOn:
    id: "case-edit-button"
- extendedWaitUntil:
    visible:
      id: "case-edit-screen"
    timeout: 15000
- takeScreenshot:
    path: "18_crm_case_edit"
- back
- back

- retry:
    maxRetries: 2
    commands:
      - tapOn:
          id: "drawer-open-button"
          retryTapIfNoChange: true
      - assertVisible:
          id: "drawer-content"
- tapOn:
    id: "drawer-copilot-tab"
- extendedWaitUntil:
    visible:
      id: "copilot-panel"
    timeout: 15000
- takeScreenshot:
    path: "19_copilot_panel"

- retry:
