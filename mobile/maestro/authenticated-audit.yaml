# docs/plans/maestro-screenshot-auth-bypass-plan.md — Phase 2: Authenticated audit
# Purpose: bootstrap an authenticated session via the e2e-bootstrap deep link
# (composed by seed-and-run.sh as SEED_BOOTSTRAP_URL), then capture the
# authenticated surface area. No inputText against login fields.
#
# Landing: /inbox (bypasses the /home → /inbox redirect hop).
appId: com.fenixcrm.app
name: Visual Audit - FenixCRM Authenticated Audit
tags:
  - screenshots
  - visual-audit
  - authenticated-audit

---

# ── 0. Bootstrap authenticated session via deep link ─────────────────────────

- openLink: ${SEED_BOOTSTRAP_URL}

# ── 1. Inbox (landing) ────────────────────────────────────────────────────────

- extendedWaitUntil:
    visible:
      id: "inbox-screen"
    timeout: 120000
- assertVisible:
    id: "inbox-screen"
- takeScreenshot:
    path: "02_inbox"

- runFlow:
    when:
      visible:
        id: "inbox-signal-${SEED_SIGNAL_ID}"
    commands:
      - tapOn:
          id: "inbox-chip-signal"
      - extendedWaitUntil:
          visible:
            id: "inbox-signal-${SEED_SIGNAL_ID}"
          timeout: 10000
      - tapOn:
          id: "inbox-signal-${SEED_SIGNAL_ID}"
      - extendedWaitUntil:
          visible:
            id: "signal-detail"
          timeout: 20000
      - takeScreenshot:
          path: "06_inbox_signal_detail"
      - back
      - extendedWaitUntil:
          visible:
            id: "inbox-screen"
          timeout: 10000

- runFlow:
    when:
      visible:
        id: "inbox-handoff-${SEED_RUN_HANDOFF_ID}"
    commands:
      - tapOn:
          id: "inbox-chip-handoff"
      - extendedWaitUntil:
          visible:
            id: "inbox-handoff-${SEED_RUN_HANDOFF_ID}"
          timeout: 10000
      - tapOn:
          id: "inbox-handoff-${SEED_RUN_HANDOFF_ID}"
      - extendedWaitUntil:
          visible:
            id: "support-case-detail-screen"
          timeout: 20000
      - takeScreenshot:
          path: "07_inbox_request_detail"
      - tapOn:
          id: "tab-inbox"
      - extendedWaitUntil:
          visible:
            id: "inbox-screen"
          timeout: 10000

# ── 2. Support ────────────────────────────────────────────────────────────────

- tapOn:
    id: "tab-support"
- extendedWaitUntil:
    visible:
      id: "support-cases-list-item-0"
    timeout: 20000
- tapOn:
    id: "support-cases-list-item-0"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: "support-case-detail-screen"
    timeout: 20000
- takeScreenshot:
    path: "03_support_case_detail"

- openLink: "fenixcrm:///support/${SEED_RESOLVED_CASE_ID}"
- extendedWaitUntil:
    visible:
      id: "support-case-detail-screen"
    timeout: 20000
- assertVisible:
    id: "kb-trigger-button"
- takeScreenshot:
    path: "11_support_kb_trigger"

# ── 3. Sales ──────────────────────────────────────────────────────────────────

- tapOn:
    id: "tab-sales"
- extendedWaitUntil:
    visible:
      id: "sales-screen"
    timeout: 20000
- tapOn:
    id: "sales-tab-deals"
- extendedWaitUntil:
    visible:
      id: "sales-deal-item-0"
    timeout: 20000
- tapOn:
    id: "sales-deal-item-0"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: "sales-deal-detail-screen"
    timeout: 20000
- tapOn:
    id: "sales-deal-brief-button"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: "sales-brief-screen"
    timeout: 120000
- takeScreenshot:
    path: "04_sales_brief"

- openLink: "fenixcrm:///sales/leads/${SEED_LEAD_ID}"
- extendedWaitUntil:
    visible:
      id: "sales-lead-detail-screen"
    timeout: 20000
- assertVisible:
    id: "prospecting-trigger-button"
- takeScreenshot:
    path: "12_sales_lead_prospecting"

- openLink: "fenixcrm:///sales/deals/${SEED_STALE_DEAL_ID}"
- extendedWaitUntil:
    visible:
      id: "sales-deal-detail-screen"
    timeout: 20000
- assertVisible:
    id: "deal-risk-trigger-button"
- takeScreenshot:
    path: "13_sales_deal_risk_active"

# ── 4. Activity (Denied Trace) ────────────────────────────────────────────────

- openLink: "fenixcrm:///activity/${SEED_RUN_DENIED_ID}"
- extendedWaitUntil:
    visible:
      id: "activity-run-detail-screen"
    timeout: 20000
- takeScreenshot:
    path: "08_activity_run_detail_denied"

- openLink: "fenixcrm:///activity/insights"
- extendedWaitUntil:
    visible:
      id: "insights-screen"
    timeout: 20000
- waitForAnimationToEnd
- takeScreenshot:
    path: "14_activity_insights"

# ── 5. Governance ─────────────────────────────────────────────────────────────

- openLink: "fenixcrm:///governance"
- extendedWaitUntil:
    visible:
      id: "governance-screen"
    timeout: 20000
- takeScreenshot:
    path: "05_governance"

# ── 6. Governance Audit Trail ────────────────────────────────────────────────

- openLink: "fenixcrm:///governance/audit"
- extendedWaitUntil:
    visible:
      id: "audit-screen"
    timeout: 20000
- takeScreenshot:
    path: "09_governance_audit"

# ── 7. Governance Usage Drilldown ────────────────────────────────────────────

- openLink: "fenixcrm:///governance/usage"
- extendedWaitUntil:
    visible:
      id: "usage-screen"
    timeout: 20000
- takeScreenshot:
    path: "10_governance_usage"

# ── 8. CRM Contacts (Task Mobile P1.4 — T1) ──────────────────────────────────

- openLink: "fenixcrm:///contacts"
- extendedWaitUntil:
    visible:
      id: "contacts-screen"
    timeout: 20000
- takeScreenshot:
    path: "15_crm_contacts_list"

- openLink: "fenixcrm:///contacts/${SEED_CONTACT_ID}"
- extendedWaitUntil:
    visible:
      id: "contact-detail-screen"
    timeout: 20000
- takeScreenshot:
    path: "16_crm_contact_detail"

# ── 9. Workflows (Task Mobile P1.4 — T2-T5) ──────────────────────────────────

- openLink: "fenixcrm:///workflows"
- extendedWaitUntil:
    visible:
      id: "workflows-list"
    timeout: 20000
- takeScreenshot:
    path: "17_workflows_list"
