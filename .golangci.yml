run:
  timeout: 10m

linters:
  enable:
    - gocritic
    - revive
    - nestif
    - gocognit
    - maintidx
    - funlen
    - govet
    - ineffassign
    - reassign
    - goconst
    - gosec          # hardcoded secrets, SQL injection, weak crypto — crítico para policy engine y RBAC
    - exhaustive     # enum switches completos — evita cases sin cubrir en policy/RBAC
    - errorlint      # manejo correcto de errors wrapping (errors.Is/As)
    - interfacebloat # ISP: interfaces con demasiados métodos indican violación de segregación
    - depguard       # DIP: impide que capas superiores dependan de capas inferiores incorrectas
    - dupl           # structural code duplication — copiar/pegar sin abstraer
    - prealloc        # detecta slices que deben pre-alocarse antes de loops
  disable:
    - gocyclo

linters-settings:
  # Alarmas (no refactor hints directos, pero útiles)
  goconst:
    min-len: 2           # detecta strings cortas también
    min-occurrences: 3   # con 2 repeticiones ya obliga a extraer
    match-constant: true # si ya existe const igual, lo usa como match
    ignore-calls: false  # no lo limites solo a args de funciones
    find-duplicates: true
    eval-const-expressions: true
    # opcional: excluir patrones (tokens, IDs, etc.)
    ignore-string-values:
      - '^[0-9a-f]{8,}$'
  gocognit:
    min-complexity: 8

  maintidx:
    # Flaggea funciones con MI < under (más bajo = peor mantenibilidad)
    under: 20

  # Smells concretos
  nestif:
    min-complexity: 3

  funlen:
    lines: 70
    statements: 35

  dupl:
    threshold: 120

  prealloc:
    simple: true          # slices inicializadas en for-range simples
    range-loops: true     # incluye for-range
    for-loops: true       # incluye for-index

  revive:
    rules:
      - name: add-constant
        severity: error
        arguments:
          - maxLitCount: "3"
            allowStrs: '""'
            allowInts: "0,1,2"
            allowFloats: "0.0,0.,1.0,1.,2.0,2."

  govet:
    enable:
      - shadow
    settings:
      shadow:
        strict: true

  # go-critic settings (algunos ejemplos de thresholds configurables)
  exhaustive:
    # Permite default en switches que manejan casos desconocidos explícitamente
    default-signifies-exhaustive: true

  gosec:
    excludes:
      - G115  # integer overflow — demasiado ruidoso en conversiones numéricas normales

  # ISP: ninguna interfaz debe tener más de 8 métodos — señal de responsabilidad múltiple
  interfacebloat:
    max: 8

  # DIP: enforce que las capas no dependan hacia abajo incorrectamente
  depguard:
    rules:
      handlers-no-infra:
        # Los handlers HTTP deben depender de interfaces de dominio, nunca de infra directamente
        list-mode: lax
        files:
          - "**/api/handlers/*.go"
        deny:
          - pkg: "github.com/matiasleandrokruk/fenix/internal/infra/sqlite"
            desc: "handlers must use domain interfaces, not infra/sqlite directly (DIP)"
          - pkg: "github.com/matiasleandrokruk/fenix/internal/infra/sqlite/sqlcgen"
            desc: "handlers must use domain interfaces, not sqlcgen directly (DIP)"
          - pkg: "github.com/matiasleandrokruk/fenix/internal/infra/llm"
            desc: "handlers must use domain interfaces, not infra/llm directly (DIP)"
      domain-no-http-layer:
        # El dominio no debe conocer la capa HTTP (handlers, middleware)
        list-mode: lax
        files:
          - "**/domain/**/*.go"
        deny:
          - pkg: "github.com/matiasleandrokruk/fenix/internal/api/handlers"
            desc: "domain must not depend on HTTP handlers (DIP — dependency inversion)"
          - pkg: "github.com/matiasleandrokruk/fenix/internal/api/middleware"
            desc: "domain must not depend on HTTP middleware (DIP — dependency inversion)"

  gocritic:
    enabled-checks:
      - nestingReduce
      - ruleguard
      - boolExprSimplify
    settings:
      ifElseChain:
        minThreshold: 4
      nestingReduce:
        bodyWidth: 4
      ruleguard:
        rules: "ruleguard/rules-*.go"
        enable: "smells,performance"
        failOn: "dsl,import"

issues:
  # Para que el gate sea más “PR-friendly”:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: ^tests/bdd/go/
      # Go BDD helpers are test harness code owned by the BDD runner.
      # They remain covered by executable scenarios and traceability gates,
      # but are excluded from static lint/smell gates to avoid blocking on
      # orchestration-heavy test setup code.
      linters:
        - gocritic
        - revive
        - nestif
        - gocognit
        - maintidx
        - funlen
        - govet
        - ineffassign
        - reassign
        - goconst
        - gosec
        - exhaustive
        - errorlint
        - interfacebloat
        - depguard
  # Exclude generated code (aligned with Makefile coverage-gate exclusions, lines 104-107)
  exclude-dirs:
    - internal/infra/sqlite/sqlcgen  # sqlc generated code
    - ruleguard
    - vendor
  exclude-files:
    - ".*\\.pb\\.go$"  # Future protobuf generated files
    - ".*_test\\.go$"  # Test files (allowed to be complex, caught by gocyclo instead)
