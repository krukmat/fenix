version: '3.9'

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      bff:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    expose:
      - "8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=/data/fenixcrm.db
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-llama3.2:3b-instruct-q4_K_M}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-nomic-embed-text}
      - CHAT_PROVIDER=${CHAT_PROVIDER:-ollama}
      - EMBED_PROVIDER=${EMBED_PROVIDER:-ollama}
      - OPENAI_COMPAT_BASE_URL=${OPENAI_COMPAT_BASE_URL:-}
      - OPENAI_COMPAT_API_KEY=${OPENAI_COMPAT_API_KEY:-}
      - OPENAI_COMPAT_MODEL=${OPENAI_COMPAT_MODEL:-}
    volumes:
      - db_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  bff:
    build:
      context: .
      dockerfile: deploy/Dockerfile.bff
    expose:
      - "3000"
    environment:
      - BACKEND_URL=http://backend:8080
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/bff/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles:
      - with-ollama
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  db_data:
  ollama_data:
